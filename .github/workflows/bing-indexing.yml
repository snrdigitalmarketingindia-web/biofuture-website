name: Bing URL Indexing

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - 'public/sitemap.xml'
      - 'src/**'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  bing-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r bing-indexing/requirements.txt

      - name: Submit URLs to Bing
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: python bing-indexing/submit_sitemap_urls.py
