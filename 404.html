<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDN Bio Products — Page Not Found</title>
  <script>
    // GitHub Pages SPA redirect — converts /path to /#/path so HashRouter handles it
    // e.g. rdnbio.com/products → rdnbio.com/#/products
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      // Skip root and known static files
      if (path === '/' || path.match(/\.(xml|txt|json|png|webp|jpg|ico|svg|css|js)$/i)) return;
      // Redirect to hash route
      var redirect = window.location.origin + '/#' + path + search;
      window.location.replace(redirect);
    })();
  </script>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0fae6; }
    .box { text-align: center; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 440px; }
    h1 { color: #2d5a0e; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    a { background: #4a8f1c; color: #fff; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. Redirecting you to the homepage…</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>
</html>
